<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Preissieger – Banner Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #1a1a1a; 
            font-family: Arial, sans-serif; 
            padding: 40px 20px;
            color: white;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        header h1 { 
            font-size: 24px; 
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        header p {
            color: #999;
            font-size: 14px;
        }

        h2 {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .section {
            margin-bottom: 30px;
        }
        
        .banner-grid { 
            display: flex; 
            flex-wrap: nowrap;
            gap: 40px;
            align-items: flex-start;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        
        .banner-item { 
            text-align: center;
            flex-shrink: 0;
        }
        
        .banner-item p { 
            margin-bottom: 12px; 
            color: #999; 
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        iframe { 
            border: none;
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        #content {
            display: none;
        }
    </style>
</head>
<body>

<div id="content">

    <header>
        <h1>AS Preissieger – Banner Preview</h1>
        <p>Alle Formate</p>
    </header>

    <div class="section">
        <h2>970 × 250 / 509 × 192</h2>
        <div class="banner-grid">

            <div class="banner-item">
                <p>Wasser – 970 × 250</p>
                <iframe src="AS_M_VS_EM_970x250_Wasser/AS_M_VS_EM_970x250_Wasser.html" 
                        width="970" height="250" scrolling="no"></iframe>
            </div>

            <div class="banner-item">
                <p>Preissiger – 509 × 192</p>
                <iframe src="AS_Banner_Preissiger_509x192/AS_Banner_Preissiger_509x192.html" 
                        width="509" height="192" scrolling="no"></iframe>
            </div>

        </div>
    </div>

    <div class="section">
        <h2>300 × 600</h2>
        <div class="banner-grid">

            <div class="banner-item">
                <p>Kundenmonitor</p>
                <iframe src="AS_Preissieger_300x600_Kundenmonitor/AS_Preissieger_300x600_Kundenmonitor.html" 
                        width="300" height="600" scrolling="no"></iframe>
            </div>

            <div class="banner-item">
                <p>Tüte</p>
                <iframe src="AS_Preissieger_300x600_Tuete/AS_Preissieger_300x600_Tuete.html" 
                        width="300" height="600" scrolling="no"></iframe>
            </div>

        </div>
    </div>

    <div class="section">
        <h2>300 × 250</h2>
        <div class="banner-grid">

            <div class="banner-item">
                <p>Kundenmonitor</p>
                <iframe src="AS_Preissieger_600x500_Kundenmonitor/AS_Preissieger_600x500_Kundenmonitor.html" 
                        width="300" height="250" scrolling="no"></iframe>
            </div>

            <div class="banner-item">
                <p>Tüte</p>
                <iframe src="AS_Preissieger_600x500_Tuete/AS_Preissieger_600x500_Tuete.html" 
                        width="300" height="250" scrolling="no"></iframe>
            </div>

        </div>
    </div>

</div>

<script>
var passwort = prompt("Bitte Passwort eingeben:");
if (passwort === "aldiTuete2026") {
    document.getElementById("content").style.display = "block";
} else {
    document.body.innerHTML = "<div style='color:white;text-align:center;margin-top:200px;font-family:Arial'><h1>Zugang verweigert</h1><p style='margin-top:20px;color:#999'>Bitte Seite neu laden und korrektes Passwort eingeben.</p></div>";
}
</script>

</body>
</html>
